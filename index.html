<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gumlet Player Addons</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070a14;
        --panel: rgba(255, 255, 255, 0.04);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.62);
        --stroke: rgba(255, 255, 255, 0.1);
        --shadow: 0 16px 60px rgba(0, 0, 0, 0.55);
        --accent: #6c5cff;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: radial-gradient(900px 600px at 20% 0%, rgba(108, 92, 255, 0.18), transparent 60%),
          radial-gradient(900px 600px at 80% 10%, rgba(23, 211, 184, 0.12), transparent 55%),
          var(--bg);
        color: var(--text);
      }

      .page {
        min-height: 100vh;
        padding: 30px 20px 64px 20px;
      }

      .container {
        width: min(980px, 100%);
        margin: 0 auto;
      }

      .header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        padding: 8px 0 18px 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .brand__dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), rgba(23, 211, 184, 0.9));
      }

      .meta {
        font-size: 13px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 14px;
      }

      .card {
        text-decoration: none;
        color: inherit;
        background: var(--panel);
        border: 1px solid var(--stroke);
        border-radius: 18px;
        padding: 18px;
        box-shadow: var(--shadow);
        display: block;
      }

      .card h2 {
        margin: 0 0 8px 0;
        font-size: 18px;
        letter-spacing: -0.01em;
      }

      .card p {
        margin: 0;
        font-size: 13px;
        line-height: 1.55;
        color: var(--muted);
      }

      @media (max-width: 780px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="container">
        <header class="header">
          <div class="brand"><span class="brand__dot"></span> Gumlet Player Addons</div>
          <div class="meta">Choose a demo page</div>
        </header>

        <div class="grid">
          <a class="card" href="./modal-player.html">
            <h2>Modal Player</h2>
            <p>
              Click-to-play preview opens a responsive modal. Includes an embed generator and copy button.
            </p>
          </a>

          <a class="card" href="./e-commerce.html">
            <h2>eCommerce Video (PIP)</h2>
            <p>
              Autoplays on page load in the bottom corner with a close button, similar to a background video.
            </p>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
